appId: com.looty.staging
---
- tapOn:
    id: detail-sell-card
- assertVisible:
    id: single-sell-summary-card
- tapOn:
    id: single-sell-edit-bought-price
- assertVisible:
    id: single-sell-bought-price-input
- tapOn:
    id: single-sell-bought-price-input
- eraseText
- inputText: "${SPOTLIGHT_MAESTRO_SINGLE_SELL_BOUGHT_PRICE}"
- tapOn:
    text: "Market price"
- swipe:
    from:
      id: single-sell-scroll-view
    direction: UP
    duration: 250
- tapOn:
    id: single-sell-save-bought-price
- tapOn:
    id: single-sell-save-bought-price
    optional: true
- assertNotVisible:
    id: single-sell-bought-price-input
- swipe:
    from:
      id: single-sell-scroll-view
    direction: UP
    duration: 400
- assertVisible:
    id: single-sell-sold-price
- tapOn:
    id: single-sell-sold-price
- assertVisible:
    id: single-sell-calculator-sheet
- tapOn:
    id: single-sell-calculator-key-5
- tapOn:
    id: single-sell-calculator-key-÷
- tapOn:
    id: single-sell-calculator-key-4
- tapOn:
    id: single-sell-calculator-equals
- swipe:
    from:
      id: single-sell-swipe-handle
    direction: UP
    duration: 1200
- assertVisible:
    id: single-sell-status-screen
- takeScreenshot: staging-smoke-single-sell
- assertVisible:
    id: portfolio-account-button
